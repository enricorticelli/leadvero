app = "leadvero"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "npx prisma db push --skip-generate"
  strategy = "rolling"

[processes]
  app = "npm start"
  worker = "npm run worker"

[env]
  NODE_ENV = "production"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  processes = ["app"]
  size = "shared-cpu-1x"
  memory = "512mb"

[[vm]]
  processes = ["worker"]
  size = "shared-cpu-1x"
  memory = "256mb"
